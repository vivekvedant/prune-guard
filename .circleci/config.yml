# .circleci/config.yml
version: 2.1

jobs:
  test:
    docker:
      - image: cimg/rust:1.94   # Pin to a versioned tag to avoid missing alias manifests
    steps:
      - checkout

      # OAuth-safe trigger guard:
      # - skip non-PR pipelines
      # - skip PRs not targeting main
      # This avoids unsupported `pipeline.event.*` variables on OAuth projects.
      - run:
          name: Enforce PR-to-main guard
          command: |
            if [ -n "${CIRCLE_TAG:-}" ]; then
              echo "Tag pipeline detected (${CIRCLE_TAG}); bypassing PR guard."
              exit 0
            fi

            pr_url="${CIRCLE_PULL_REQUEST:-}"
            if [ -z "${pr_url}" ] && [ -n "${CIRCLE_PULL_REQUESTS:-}" ]; then
              # Some OAuth pipelines expose a comma-separated PR URL list.
              pr_url="$(printf '%s' "${CIRCLE_PULL_REQUESTS}" | cut -d',' -f1)"
            fi

            if [ -z "${pr_url}" ]; then
              echo "No pull request context found; halting."
              circleci-agent step halt
              exit 0
            fi

            pr_number="${pr_url##*/}"
            api_url="https://api.github.com/repos/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}/pulls/${pr_number}"

            auth_header=()
            if [ -n "${GITHUB_TOKEN:-}" ]; then
              auth_header=(-H "Authorization: Bearer ${GITHUB_TOKEN}")
            fi

            if ! payload="$(curl -fsSL "${auth_header[@]}" -H "Accept: application/vnd.github+json" "${api_url}" | tr -d '\n')"; then
              echo "Failed to fetch PR metadata for ${pr_url}; refusing to proceed."
              exit 1
            fi

            base_ref="$(printf '%s' "${payload}" | sed -n 's/.*"base":[[:space:]]*{[^}]*"ref":[[:space:]]*"\([^"]*\)".*/\1/p')"

            if [ -z "${base_ref}" ]; then
              echo "Could not resolve PR base branch; refusing to proceed."
              exit 1
            fi

            if [ "${base_ref}" != "main" ]; then
              echo "PR targets '${base_ref}', not 'main'; halting."
              circleci-agent step halt
              exit 0
            fi

      # Cache cargo dependencies
      - restore_cache:
          keys:
            - cargo-{{ checksum "Cargo.lock" }}

      # Run tests
      - run:
          name: Run full test suite
          command: cargo test --all-targets --all-features --locked

      # Save cache
      - save_cache:
          paths:
            - ~/.cargo
            - target
          key: cargo-{{ checksum "Cargo.lock" }}

  linux-build-package:
    docker:
      - image: cimg/rust:1.94
    steps:
      - checkout
      - run:
          name: Enforce PR-to-main guard
          command: |
            if [ -n "${CIRCLE_TAG:-}" ]; then
              echo "Tag pipeline detected (${CIRCLE_TAG}); bypassing PR guard."
              exit 0
            fi

            pr_url="${CIRCLE_PULL_REQUEST:-}"
            if [ -z "${pr_url}" ] && [ -n "${CIRCLE_PULL_REQUESTS:-}" ]; then
              pr_url="$(printf '%s' "${CIRCLE_PULL_REQUESTS}" | cut -d',' -f1)"
            fi

            if [ -z "${pr_url}" ]; then
              echo "No pull request context found; halting."
              circleci-agent step halt
              exit 0
            fi

            pr_number="${pr_url##*/}"
            api_url="https://api.github.com/repos/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}/pulls/${pr_number}"

            auth_header=()
            if [ -n "${GITHUB_TOKEN:-}" ]; then
              auth_header=(-H "Authorization: Bearer ${GITHUB_TOKEN}")
            fi

            if ! payload="$(curl -fsSL "${auth_header[@]}" -H "Accept: application/vnd.github+json" "${api_url}" | tr -d '\n')"; then
              echo "Failed to fetch PR metadata for ${pr_url}; refusing to proceed."
              exit 1
            fi

            base_ref="$(printf '%s' "${payload}" | sed -n 's/.*"base":[[:space:]]*{[^}]*"ref":[[:space:]]*"\([^"]*\)".*/\1/p')"

            if [ -z "${base_ref}" ]; then
              echo "Could not resolve PR base branch; refusing to proceed."
              exit 1
            fi

            if [ "${base_ref}" != "main" ]; then
              echo "PR targets '${base_ref}', not 'main'; halting."
              circleci-agent step halt
              exit 0
            fi

      - run:
          name: Run tests
          command: cargo test --locked

      - run:
          name: Build release
          command: cargo build --release --locked

      - run:
          name: Smoke test release outputs
          command: |
            set -euo pipefail
            release_dir="target/release"
            if [ ! -d "$release_dir" ]; then
              echo "Release directory missing: $release_dir"
              exit 1
            fi

            first_release_file="$(find "$release_dir" -type f -size +0c -print -quit)"
            if [ -z "$first_release_file" ]; then
              echo "Release directory does not contain any non-empty files."
              exit 1
            fi

      - run:
          name: Package artifacts
          command: |
            bash scripts/release/package-artifacts-deb.sh \
              --workspace-root "$PWD" \
              --output-dir dist

      - run:
          name: Verify packaged artifacts
          command: |
            set -euo pipefail
            archive_path="$(find dist -type f -name "*.deb" -print -quit)"
            if [ -z "$archive_path" ] || [ ! -s "$archive_path" ]; then
              echo "Packaged archive is missing or empty."
              exit 1
            fi

            checksum_path="${archive_path}.sha256"
            if [ ! -s "$checksum_path" ]; then
              echo "Checksum file is missing or empty."
              exit 1
            fi

            dpkg-deb --info "$archive_path" >/dev/null
            contents="$(dpkg-deb --contents "$archive_path")"
            case "$contents" in
              *"/etc/prune-guard/prune-guard.toml"*) ;;
              *)
                echo "Linux .deb is missing /etc/prune-guard/prune-guard.toml."
                exit 1
                ;;
            esac

            case "$contents" in
              *"/usr/bin/prune-guard"*) ;;
              *)
                echo "Linux .deb is missing /usr/bin/prune-guard."
                exit 1
                ;;
            esac

            case "$contents" in
              *"/lib/systemd/system/prune-guard.service"*) ;;
              *)
                echo "Linux .deb is missing /lib/systemd/system/prune-guard.service."
                exit 1
                ;;
            esac

            case "$contents" in
              *"/lib/systemd/system/prune-guard.timer"*) ;;
              *)
                echo "Linux .deb is missing /lib/systemd/system/prune-guard.timer."
                exit 1
                ;;
            esac

            case "$contents" in
              *"/usr/lib/prune-guard/release"*)
                echo "Linux .deb must not include the recursive target/release build tree."
                exit 1
                ;;
              *) ;;
            esac

      - store_artifacts:
          path: dist
          destination: prune-guard-linux

      - persist_to_workspace:
          root: .
          paths:
            - dist

  macos-build-package:
    macos:
      xcode: "15.4.0"
    steps:
      - checkout
      - run:
          name: Enforce PR-to-main guard
          command: |
            if [ -n "${CIRCLE_TAG:-}" ]; then
              echo "Tag pipeline detected (${CIRCLE_TAG}); bypassing PR guard."
              exit 0
            fi

            pr_url="${CIRCLE_PULL_REQUEST:-}"
            if [ -z "${pr_url}" ] && [ -n "${CIRCLE_PULL_REQUESTS:-}" ]; then
              pr_url="$(printf '%s' "${CIRCLE_PULL_REQUESTS}" | cut -d',' -f1)"
            fi

            if [ -z "${pr_url}" ]; then
              echo "No pull request context found; halting."
              circleci-agent step halt
              exit 0
            fi

            pr_number="${pr_url##*/}"
            api_url="https://api.github.com/repos/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}/pulls/${pr_number}"

            auth_header=()
            if [ -n "${GITHUB_TOKEN:-}" ]; then
              auth_header=(-H "Authorization: Bearer ${GITHUB_TOKEN}")
            fi

            if ! payload="$(curl -fsSL "${auth_header[@]}" -H "Accept: application/vnd.github+json" "${api_url}" | tr -d '\n')"; then
              echo "Failed to fetch PR metadata for ${pr_url}; refusing to proceed."
              exit 1
            fi

            base_ref="$(printf '%s' "${payload}" | sed -n 's/.*"base":[[:space:]]*{[^}]*"ref":[[:space:]]*"\([^"]*\)".*/\1/p')"
            if [ -z "${base_ref}" ]; then
              echo "Could not resolve PR base branch; refusing to proceed."
              exit 1
            fi

            if [ "${base_ref}" != "main" ]; then
              echo "PR targets '${base_ref}', not 'main'; halting."
              circleci-agent step halt
              exit 0
            fi

      - run:
          name: Install Rust if missing
          command: |
            if ! command -v cargo >/dev/null 2>&1; then
              curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal
            fi
            echo 'export PATH="$HOME/.cargo/bin:$PATH"' >> "$BASH_ENV"

      - run:
          name: Run tests
          command: |
            source "$BASH_ENV"
            cargo test --locked

      - run:
          name: Build release
          command: |
            source "$BASH_ENV"
            cargo build --release --locked

      - run:
          name: Smoke test release outputs
          command: |
            set -euo pipefail
            release_dir="target/release"
            if [ ! -d "$release_dir" ]; then
              echo "Release directory missing: $release_dir"
              exit 1
            fi

            first_release_file="$(find "$release_dir" -type f -size +0c -print -quit)"
            if [ -z "$first_release_file" ]; then
              echo "Release directory does not contain any non-empty files."
              exit 1
            fi

      - run:
          name: Package artifacts
          command: |
            source "$BASH_ENV"
            bash scripts/release/package-artifacts.sh \
              --workspace-root "$PWD" \
              --output-dir dist

      - run:
          name: Verify packaged artifacts
          command: |
            set -euo pipefail
            archive_path="$(find dist -type f -name "*.tar.gz" -print -quit)"
            if [ -z "$archive_path" ] || [ ! -s "$archive_path" ]; then
              echo "Packaged archive is missing or empty."
              exit 1
            fi

            checksum_path="${archive_path}.sha256"
            if [ ! -s "$checksum_path" ]; then
              echo "Checksum file is missing or empty."
              exit 1
            fi

            tar -tzf "$archive_path" >/dev/null

      - store_artifacts:
          path: dist
          destination: prune-guard-macos

      - persist_to_workspace:
          root: .
          paths:
            - dist

  windows-build-package:
    machine:
      image: windows-server-2022-gui:current
    resource_class: windows.medium
    shell: powershell.exe -ExecutionPolicy Bypass
    steps:
      - checkout

      - run:
          name: Install Rust if missing
          command: |
            if (-not (Get-Command cargo -ErrorAction SilentlyContinue)) {
              Invoke-WebRequest -Uri https://win.rustup.rs/x86_64 -OutFile rustup-init.exe
              .\rustup-init.exe -y --profile minimal --default-toolchain stable
            }

            if (-not (Get-Command iscc -ErrorAction SilentlyContinue)) {
              choco install innosetup -y --no-progress
            }

            $env:Path = "$env:USERPROFILE\.cargo\bin;$env:Path"
            cargo --version
            rustc --version

      - run:
          name: Run tests
          command: |
            $env:Path = "$env:USERPROFILE\.cargo\bin;$env:Path"
            cargo test --locked

      - run:
          name: Build release
          command: |
            $env:Path = "$env:USERPROFILE\.cargo\bin;$env:Path"
            cargo build --release --locked

      - run:
          name: Smoke test release outputs
          command: |
            if (-not (Test-Path -LiteralPath "target\release")) {
              throw "Release directory missing: target\release"
            }

            $firstReleaseFile = Get-ChildItem -LiteralPath "target\release" -Recurse -File |
              Where-Object { $_.Length -gt 0 } |
              Select-Object -First 1
            if (-not $firstReleaseFile) {
              throw "Release directory does not contain any non-empty files."
            }

      - run:
          name: Package artifacts
          command: |
            $env:Path = "$env:USERPROFILE\.cargo\bin;$env:Path"
            powershell -NoProfile -ExecutionPolicy Bypass -File scripts/release/package-artifacts.ps1 `
              -WorkspaceRoot $PWD `
              -OutputDir dist

      - run:
          name: Verify packaged artifacts
          command: |
            $archivePath = Get-ChildItem -LiteralPath dist -Filter *.zip -File | Select-Object -First 1
            if (-not $archivePath -or $archivePath.Length -le 0) {
              throw "Packaged zip archive is missing or empty."
            }

            $checksumPath = "$($archivePath.FullName).sha256"
            if (-not (Test-Path -LiteralPath $checksumPath)) {
              throw "Zip checksum file is missing."
            }
            if ((Get-Item -LiteralPath $checksumPath).Length -le 0) {
              throw "Zip checksum file is empty."
            }

            $verifyDir = Join-Path $env:TEMP "prune-guard-verify-$([Guid]::NewGuid().ToString('N'))"
            New-Item -ItemType Directory -Force -Path $verifyDir | Out-Null
            try {
              Expand-Archive -LiteralPath $archivePath.FullName -DestinationPath $verifyDir -Force
            } finally {
              Remove-Item -LiteralPath $verifyDir -Recurse -Force -ErrorAction SilentlyContinue
            }

            $installerPath = Get-ChildItem -LiteralPath dist -Filter *-setup.exe -File | Select-Object -First 1
            if (-not $installerPath -or $installerPath.Length -le 0) {
              throw "Packaged installer exe is missing or empty."
            }

            $installerChecksumPath = "$($installerPath.FullName).sha256"
            if (-not (Test-Path -LiteralPath $installerChecksumPath)) {
              throw "Installer checksum file is missing."
            }
            if ((Get-Item -LiteralPath $installerChecksumPath).Length -le 0) {
              throw "Installer checksum file is empty."
            }

      - store_artifacts:
          path: dist
          destination: prune-guard-windows

      - persist_to_workspace:
          root: .
          paths:
            - dist

  github-release-publish:
    docker:
      - image: cimg/base:stable
    steps:
      - attach_workspace:
          at: /tmp/prune-guard-workspace

      - run:
          name: Publish GitHub release assets
          command: |
            set -euo pipefail

            if [ -z "${CIRCLE_TAG:-}" ]; then
              echo "No tag context found; refusing release publication."
              exit 1
            fi

            if [ -z "${GITHUB_TOKEN:-}" ]; then
              echo "GITHUB_TOKEN is required for release publication."
              exit 1
            fi

            if [ -z "${CIRCLE_PROJECT_USERNAME:-}" ] || [ -z "${CIRCLE_PROJECT_REPONAME:-}" ]; then
              echo "CircleCI project metadata is incomplete; refusing release publication."
              exit 1
            fi

            if ! command -v gh >/dev/null 2>&1; then
              sudo mkdir -p /etc/apt/keyrings
              curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
                | sudo tee /etc/apt/keyrings/githubcli-archive-keyring.gpg >/dev/null
              sudo chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
                | sudo tee /etc/apt/sources.list.d/github-cli.list >/dev/null
              sudo apt-get update
              sudo apt-get install -y gh
            fi

            export GH_TOKEN="${GITHUB_TOKEN}"
            export GH_REPO="${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}"

            workspace_dist="/tmp/prune-guard-workspace/dist"
            if [ ! -d "$workspace_dist" ]; then
              echo "Workspace dist directory missing: $workspace_dist"
              exit 1
            fi

            linux_deb="$(find "$workspace_dist" -maxdepth 1 -type f -name "*.deb" -print -quit)"
            linux_sha="$(find "$workspace_dist" -maxdepth 1 -type f -name "*.deb.sha256" -print -quit)"
            mac_archive="$(find "$workspace_dist" -maxdepth 1 -type f -name "*.tar.gz" -print -quit)"
            mac_sha="$(find "$workspace_dist" -maxdepth 1 -type f -name "*.tar.gz.sha256" -print -quit)"
            windows_archive="$(find "$workspace_dist" -maxdepth 1 -type f -name "*.zip" -print -quit)"
            windows_sha="$(find "$workspace_dist" -maxdepth 1 -type f -name "*.zip.sha256" -print -quit)"
            windows_installer="$(find "$workspace_dist" -maxdepth 1 -type f -name "*-setup.exe" -print -quit)"
            windows_installer_sha="$(find "$workspace_dist" -maxdepth 1 -type f -name "*-setup.exe.sha256" -print -quit)"

            for required_asset in \
              "$linux_deb" \
              "$linux_sha" \
              "$mac_archive" \
              "$mac_sha" \
              "$windows_archive" \
              "$windows_sha" \
              "$windows_installer" \
              "$windows_installer_sha"; do
              if [ -z "$required_asset" ] || [ ! -s "$required_asset" ]; then
                echo "Release asset missing or empty."
                exit 1
              fi
            done

            release_notes="Automated CircleCI release for ${CIRCLE_TAG}. All platform artifacts passed build, packaging, and smoke checks."
            if gh release view "${CIRCLE_TAG}" --repo "${GH_REPO}" >/dev/null 2>&1; then
              gh release upload "${CIRCLE_TAG}" \
                "$linux_deb" \
                "$linux_sha" \
                "$mac_archive" \
                "$mac_sha" \
                "$windows_archive" \
                "$windows_sha" \
                "$windows_installer" \
                "$windows_installer_sha" \
                --repo "${GH_REPO}" \
                --clobber
            else
              gh release create "${CIRCLE_TAG}" \
                "$linux_deb" \
                "$linux_sha" \
                "$mac_archive" \
                "$mac_sha" \
                "$windows_archive" \
                "$windows_sha" \
                "$windows_installer" \
                "$windows_installer_sha" \
                --repo "${GH_REPO}" \
                --title "prune-guard ${CIRCLE_TAG}" \
                --notes "$release_notes"
            fi

workflows:
  version: 2
  pr-main-tests:
    jobs:
      - test:
          filters:
            branches:
              ignore: main
            tags:
              ignore: /.*/
  cross-platform-build-distribution:
    jobs:
      - linux-build-package:
          filters:
            branches:
              ignore: main
            tags:
              ignore: /.*/
      - macos-build-package:
          filters:
            branches:
              ignore: main
            tags:
              ignore: /.*/
      - windows-build-package:
          filters:
            branches:
              ignore: main
            tags:
              ignore: /.*/
  release-github-assets:
    jobs:
      - linux-build-package:
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^v.*/
      - macos-build-package:
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^v.*/
      - windows-build-package:
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^v.*/
      - github-release-publish:
          requires:
            - linux-build-package
            - macos-build-package
            - windows-build-package
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^v.*/
