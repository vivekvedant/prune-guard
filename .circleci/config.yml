# .circleci/config.yml
version: 2.1

jobs:
  test:
    docker:
      - image: cimg/rust:1.94   # Pin to a versioned tag to avoid missing alias manifests
    steps:
      - checkout

      # Cache cargo dependencies
      - restore_cache:
          keys:
            - cargo-{{ checksum "Cargo.lock" }}

      # Run tests
      - run:
          name: Run full test suite
          command: cargo test --all-targets --all-features --locked

      # Save cache
      - save_cache:
          paths:
            - ~/.cargo
            - target
          key: cargo-{{ checksum "Cargo.lock" }}

workflows:
  version: 2
  pr-main-tests:
    # Run only for pull request pipelines that target main.
    # This avoids push-only branch filters that would skip PR branch runs.
    when: pipeline.event.name == "pull_request" and pipeline.event.github.pull_request.base.ref == "main"
    jobs:
      - test
