# Prune Guard installation template.
# Deploy this file to: /etc/prune-guard/prune-guard.toml
#
# Safety-first defaults:
# - dry_run defaults to false (real execution)
# - conservative watermarks and age thresholds
# - explicit protected lists default to empty

[runtime]
interval_secs = 900
dry_run = false

[thresholds]
high_watermark_percent = 85
target_watermark_percent = 70

[cleanup]
min_unused_age_days = 30
max_delete_per_run_gb = 10

[backends]
enabled_backends = ["docker"]

[docker]
# Optional Docker daemon selection for service environments.
# If both values remain unset, prune-guard auto-detects a reachable socket from known local paths.
# If exactly one Docker Desktop socket is reachable, it is preferred automatically.
# Startup still fails closed on ambiguous reachable Desktop sockets or ambiguous non-Desktop sockets.
# Set exactly one of the following when the daemon must target a specific non-default Docker endpoint.
# host = "unix:///home/<user>/.docker/desktop/docker.sock"
# context = "desktop-linux"

[allowlists]
protected_images = []
protected_volumes = []
protected_labels = []
